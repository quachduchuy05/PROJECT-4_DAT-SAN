<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sân bóng</title>
</head>
<body>

<h1>DANH SÁCH SÂN BÓNG</h1>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eef4ff, #f8fbff);
        padding: 40px;
        color: #1f2937;
    }

    .container {
        width: 92%;
        max-width: 1200px;
        margin: auto;
    }

    h1 {
        text-align: center;
        color: #0f172a;
        margin-bottom: 35px;
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    table th {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #ffffff;
        padding: 18px 16px;
        font-size: 17px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    table td {
        padding: 17px 16px;
        text-align: center;
        border-bottom: 1px solid #e5e7eb;
        font-size: 16px;
        color: #374151;
    }

    table tr:last-child td {
        border-bottom: none;
    }

    table tbody tr {
        transition: all 0.25s ease;
    }

    table tbody tr:hover {
        background: #f8fafc;
        transform: scale(1.01);
    }

    a {
        display: inline-block;
        margin-top: 25px;
        padding: 13px 24px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(34, 197, 94, 0.25);
        transition: all 0.3s ease;
    }

    a:hover {
        background: linear-gradient(135deg, #16a34a, #15803d);
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(34, 197, 94, 0.35);
    }
    @media (max-width: 768px) {
    body {
        padding: 20px;
    }

    h1 {
        font-size: 30px;
    }

    .container {
        width: 100%;
        overflow-x: auto;
    }

    table {
        min-width: 700px;
    }
}
</style>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tên sân</th>
        <th>Loại sân</th>
        <th>Giá</th>
    </tr>

    <tr th:each="s : ${danhsach}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.tenSan}"></td>
        <td th:text="${s.loaiSan}"></td>
        <td th:text="${s.gia}"></td>
    </tr>

</table>

<br>

<a href="/thoigian">Xem thời gian sử dụng</a>

</body>
</html>
