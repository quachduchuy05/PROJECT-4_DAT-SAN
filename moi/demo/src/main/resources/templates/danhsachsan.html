<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Danh sách sân bóng</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body{
            min-height:100vh;
            background:#f5f7fb;
            color:#1e293b;
        }

        /* HEADER */

        .header{
            width:100%;
            background:
            linear-gradient(rgba(11,143,58,0.75), rgba(11,143,58,0.75)),
            url("https://images.unsplash.com/photo-1518604666860-9ed391f76460?q=80&w=1600&auto=format&fit=crop")
            center/cover no-repeat;

            padding:70px 20px;
            text-align:center;
            color:white;
        }

        .header h1{
            font-size:48px;
            margin-bottom:12px;
            font-weight:700;
        }

        .header p{
            font-size:18px;
            opacity:0.95;
        }

        /* CONTAINER */

        .container{
            width:90%;
            max-width:1300px;
            margin:auto;
            margin-top:-45px;
            margin-bottom:50px;
        }

        /* CARD */

        .table-card{
            background:white;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
            padding:30px;
        }

        /* TOP BAR */

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
            gap:20px;
            flex-wrap:wrap;
        }

        .search-box{
            flex:1;
            min-width:260px;
        }

        .search-box input{
            width:100%;
            padding:15px 18px;
            border:1px solid #dbe2ea;
            border-radius:14px;
            font-size:15px;
            outline:none;
            transition:0.3s;
            background:#f8fafc;
        }

        .search-box input:focus{
            border-color:#0b8f3a;
            box-shadow:0 0 0 4px rgba(11,143,58,0.12);
            background:white;
        }

        .add-btn{
            text-decoration:none;
            background:linear-gradient(135deg,#0b8f3a,#16a34a);
            color:white;
            padding:14px 22px;
            border-radius:14px;
            font-weight:600;
            transition:0.3s;
            box-shadow:0 10px 22px rgba(11,143,58,0.2);
        }

        .add-btn:hover{
            transform:translateY(-3px);
        }

        /* TABLE */

        .table-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th{
            background:linear-gradient(135deg,#0b8f3a,#16a34a);
            color:white;
            padding:18px;
            font-size:15px;
            text-transform:uppercase;
            letter-spacing:0.5px;
        }

        table td{
            padding:18px;
            text-align:center;
            border-bottom:1px solid #edf2f7;
            font-size:15px;
        }

        tbody tr{
            transition:0.25s;
        }

        tbody tr:hover{
            background:#f8fafc;
            transform:scale(1.005);
        }

        .price{
            color:#0b8f3a;
            font-weight:700;
        }

        .badge{
            display:inline-block;
            padding:7px 14px;
            border-radius:30px;
            font-size:13px;
            font-weight:600;
            background:#dcfce7;
            color:#15803d;
        }

        /* ACTION BUTTONS */

        .action-buttons{
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .btn{
            text-decoration:none;
            padding:10px 14px;
            border-radius:10px;
            color:white;
            font-size:14px;
            font-weight:600;
            transition:0.3s;
        }

        .edit-btn{
            background:#2563eb;
        }

        .delete-btn{
            background:#ef4444;
        }

        .btn:hover{
            transform:translateY(-2px);
            opacity:0.92;
        }

        /* FOOTER BUTTON */

        .footer-btn{
            margin-top:30px;
            text-align:center;
        }

        .footer-btn a{
            display:inline-block;
            text-decoration:none;
            background:#111827;
            color:white;
            padding:15px 28px;
            border-radius:14px;
            font-weight:600;
            transition:0.3s;
        }

        .footer-btn a:hover{
            background:#000;
            transform:translateY(-3px);
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .header h1{
                font-size:34px;
            }

            .header p{
                font-size:15px;
            }

            .table-card{
                padding:20px;
            }

            table{
                min-width:700px;
            }
        }

    </style>

</head>
<script th:src="@{/main.js}"></script>
<body>

<div class="header">

    <h1>DANH SÁCH SÂN BÓNG</h1>

    <p>
        Quản lý thông tin sân bóng chuyên nghiệp và hiện đại
    </p>

</div>

<div class="container">

    <div class="table-card">

        <div class="top-bar">

            <div class="search-box">
                <input type="text"
                       id="searchInput"
                       placeholder="Tìm kiếm tên sân...">
            </div>

            <a href="/them-san" class="add-btn">
                + Thêm sân mới
            </a>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Tên sân</th>
                    <th>Loại sân</th>
                    <th>Giá thuê</th>
                    <th>Thao tác</th>
                </tr>

                </thead>

                <tbody id="tableBody">

                <tr th:each="s : ${danhsach}">

                    <td th:text="${s.id}"></td>

                    <td th:text="${s.tenSan}"></td>

                    <td>
                        <span class="badge"
                              th:text="${s.loaiSan}">
                        </span>
                    </td>

                    <td class="price"
                        th:text="${s.gia} + ' VNĐ'">
                    </td>

                    <td>

                        <div class="action-buttons">

                            <a th:href="@{'/sua/' + ${s.id}}"
                               class="btn edit-btn">
                                Sửa
                            </a>

                            <a th:href="@{'/xoa/' + ${s.id}}"
                               class="btn delete-btn">
                                Xóa
                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

        <div class="footer-btn">

            <a href="/thoigian">
                ⏰ Xem thời gian sử dụng
            </a>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function(){

        let filter = searchInput.value.toLowerCase();

        let rows = document.querySelectorAll("#tableBody tr");

        rows.forEach(row => {

            let text = row.innerText.toLowerCase();

            row.style.display =
                text.includes(filter)
                ? ""
                : "none";

        });

    });

</script>

</body>
</html>
