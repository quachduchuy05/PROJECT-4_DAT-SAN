<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thời gian hoạt động</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", Arial, sans-serif;
        }

        body{
            min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
            url("https://images.unsplash.com/photo-1518604666860-9ed391f76460?q=80&w=1600&auto=format&fit=crop")
            center/cover no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:850px;
        }

        .card{
            background:white;
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
            animation:fadeIn 0.5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .header{
            background:
            linear-gradient(135deg,#0b8f3a,#16a34a);

            padding:40px 30px;
            text-align:center;
            color:white;
        }

        .header h1{
            font-size:42px;
            margin-bottom:12px;
        }

        .header p{
            font-size:17px;
            opacity:0.95;
        }

        .content{
            padding:35px;
        }

        .schedule-list{
            display:grid;
            gap:18px;
        }

        .schedule-item{
            background:#f8fafc;
            border-radius:18px;
            padding:22px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:0.3s;
            border:1px solid #edf2f7;
        }

        .schedule-item:hover{
            transform:translateY(-4px);
            background:white;
            box-shadow:0 12px 24px rgba(0,0,0,0.08);
        }

        .time{
            font-size:24px;
            font-weight:700;
            color:#0b8f3a;
        }

        .status{
            background:#dcfce7;
            color:#15803d;
            padding:10px 16px;
            border-radius:30px;
            font-size:14px;
            font-weight:600;
        }

        .footer{
            margin-top:35px;
            text-align:center;
        }

        .footer a{
            display:inline-block;
            text-decoration:none;
            background:#111827;
            color:white;
            padding:15px 28px;
            border-radius:14px;
            font-size:16px;
            font-weight:600;
            transition:0.3s;
        }

        .footer a:hover{
            background:black;
            transform:translateY(-3px);
            box-shadow:0 12px 24px rgba(0,0,0,0.2);
        }

        @media(max-width:768px){

            .header h1{
                font-size:32px;
            }

            .schedule-item{
                flex-direction:column;
                gap:12px;
                text-align:center;
            }

            .time{
                font-size:20px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <h1>⏰ THỜI GIAN HOẠT ĐỘNG</h1>

            <p>
                Hệ thống khung giờ hoạt động sân bóng mỗi ngày
            </p>

        </div>

        <div class="content">

            <div class="schedule-list">

                <div class="schedule-item">
                    <div class="time">06:00 - 08:00</div>
                    <div class="status">Còn trống</div>
                </div>

                <div class="schedule-item">
                    <div class="time">08:00 - 10:00</div>
                    <div class="status">Còn trống</div>
                </div>

                <div class="schedule-item">
                    <div class="time">14:00 - 16:00</div>
                    <div class="status">Đang hoạt động</div>
                </div>

                <div class="schedule-item">
                    <div class="time">16:00 - 18:00</div>
                    <div class="status">Còn trống</div>
                </div>

                <div class="schedule-item">
                    <div class="time">18:00 - 20:00</div>
                    <div class="status">Khung giờ cao điểm</div>
                </div>

            </div>

            <div class="footer">

                <a href="/sanbong">
                    ← Quay lại danh sách sân
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
