<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập Admin</title>

    <link rel="stylesheet" th:href="@{/login.css}">

</head>

<body>

<div class="overlay"></div>

<div class="login-container">

    <div class="login-left">

        <div class="content">

            <h1>⚽ ĐẶT SÂN 247</h1>

            <p>
                Hệ thống quản lý sân bóng hiện đại,
                đặt sân nhanh chóng và chuyên nghiệp.
            </p>

        </div>

    </div>

    <div class="login-right">

        <div class="login-box">

            <h2>LOGIN ADMIN</h2>

            <p class="sub-text">
                Đăng nhập để quản lý hệ thống sân bóng
            </p>

            <form action="/login" method="post">

                <div class="input-box">
                    <input type="text"
                           name="username"
                           placeholder="Nhập username">
                </div>

                <div class="input-box">
                    <input type="password"
                           name="password"
                           placeholder="Nhập password">
                </div>

                <button type="submit">
                    Đăng nhập
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
